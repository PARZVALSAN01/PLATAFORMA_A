spring.application.name=instituto-anahuac-platform
spring.profiles.active=dev

# MySQL
spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/instituto_anahuac?useSSL=false&serverTimezone=America/Mexico_City&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=${JWT_SECRET:change-this-development-secret-at-least-32-characters-long}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:604800000}

# Server
server.port=${SERVER_PORT:8080}

# File upload
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB
app.upload.dir=${UPLOAD_DIR:./uploads}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}
